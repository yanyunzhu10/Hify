server:
  port: 8080

spring:
  application:
    name: hify

  # ===== 数据源（MySQL 主库） =====
  datasource:
    mysql:
      url: jdbc:mysql://localhost:3306/hify?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:123456}
      driver-class-name: com.mysql.cj.jdbc.Driver
    pgvector:
      url: jdbc:postgresql://localhost:5432/hify
      username: ${PG_USERNAME:zyy}
      password: ${PG_PASSWORD:}

#    hikari:
#      maximum-pool-size: 20
#      minimum-idle: 5
#      connection-timeout: 3000
#      idle-timeout: 600000
#      max-lifetime: 1800000

  # ===== pgvector 数据源 =====
#  datasource-pg:
#  datasource:
#    url: jdbc:postgresql://localhost:5432/hify
#    username: ${PG_USERNAME:zyy}
#    password: ${PG_PASSWORD:}

  # ===== Redis =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  # ===== Jackson =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ===== 异步任务 =====
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100

# ===== MyBatis-Plus =====
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.hify.**.entity
  global-config:
    db-config:
      table-prefix: t_
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumOrdinalTypeHandler

# ===== Resilience4j =====
# 仅声明 default 配置；具体熔断器实例由 CircuitBreakerService 按 providerName 动态创建
# 重试逻辑不走 resilience4j-retry，由 CircuitBreakerService 按 LlmApiException.Type 自定义
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

# ===== Hify 业务配置 =====
hify:
  llm:
    fallback:
      openai: ollama
      claude: openai
      gemini: ollama
  async:
    llm-pool:
      core-size: 20
      max-size: 50
      queue-capacity: 100
    llm-stream-pool:
      core-size: 30
      max-size: 80
      queue-capacity: 50
  resilience:
    retry:
      # 网络超时：固定间隔重试
      timeout:
        max-attempts: 2
        interval: 1s
      # 限流（429）：指数退避，列表长度即重试次数
      rate-limit:
        backoffs: [2s, 4s]

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ===== 日志 =====
logging:
  config: classpath:logback-spring.xml

---
# ===== 开发环境覆盖 =====
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    # 开发环境启用 p6spy 慢查询拦截
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: jdbc:p6spy:mysql://localhost:3306/hify?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai

logging:
  level:
    com.hify: DEBUG
    org.springframework.web: DEBUG
